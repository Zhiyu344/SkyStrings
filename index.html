<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Sky Text Lookup</title>
        <link rel="stylesheet" href="css/style.css">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="row">
            <button id="settingsBtn">⚙ Settings</button>
        </div>

        <!-- Settings Panel -->
        <div id="settingsPanel" class="settings-panel hidden">
            <div class="row">
                <label>
                    <span id="uiLangLabel">UI Language: </span>
                    <select id="uiLangSelect">
                        <option value="de">Deutsch</option>
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="id">Bahasa Indonesia</option>
                        <option value="it">Italiano</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                        <option value="pt">Português</option>
                        <option value="ru">Русский</option>
                        <option value="th">ภาษาไทย</option>
                        <option value="vi">Tiếng Việt</option>
                        <option value="zh">中文</option>
                    </select>
                </label>
            </div>

            <div class="row">
                <label>
                    <span id="modeLabel">Comparison Mode: </span>
                    <select id="modeSelect">
                        <option value="2" id="select1">Bilingual</option>
                        <option value="3" id="select2">Trilingual</option>
                    </select>
                </label>
            </div>
        </div>
        <div id="app">

        <!-- Language selectors -->
            <div class="row">
                <label>
                    <span id="sourceLabel">Source: </span>
                    <select id="sourceLang"></select>
                </label>
            </div>

            <div id="targetLangContainer" class="row"></div>

            <!-- Search input -->
            <div class="row">
                <input
                    id="searchInput"
                    type="text"
                    placeholder="Enter keyword..."
                />
            </div>

            <!-- Results -->
            <div id="results"></div>

        </div>
        <script src="js/app.js"></script>
        <script src="js/i18n.js"></script>
    </body>
</html>
